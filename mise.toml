# mise configuration for the SwitchOS exporter.
# Install mise (https://mise.jdx.dev), then run `mise install` followed by
# `mise run setup`. A project-local .venv is created and activated automatically.

[tools]
python = "3.11"

[env]
# Create and auto-activate a virtualenv at .venv for this project.
_.python.venv = { path = ".venv", create = true }

[tasks.setup]
description = "Install Python dependencies (incl. dev/test) into the virtualenv"
run = "pip install -r requirements-dev.txt"

[tasks.exporter]
description = "Run the exporter (pass args after --, e.g. mise run exporter -- --port 9080 my.yaml)"
run = "python3 switchos_exporter.py"

[tasks.test]
description = "Run the test suite"
run = "pytest -q"

[tasks.config]
description = "Validate the device config file (prints the loaded devices)"
run = "python3 device_config.py"
