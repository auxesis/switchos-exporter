name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Installs the toolchain pinned in mise.toml (Python) and caches it.
      - uses: jdx/mise-action@v4

      - name: Install dependencies
        run: mise run setup

      - name: Run tests
        run: mise run test
